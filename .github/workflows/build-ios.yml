name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Limpar SDKs conflitantes
      run: |
        echo "Removendo SDKs 9 e 10"
        sudo rm -rf /Users/runner/.dotnet/sdk/9.* || true
        sudo rm -rf /Users/runner/.dotnet/sdk/10.* || true
        echo "DOTNET_ROOT=/Users/runner/.dotnet" >> $GITHUB_ENV
        echo "$HOME/.dotnet" >> $GITHUB_PATH
        
    - name: Configurar .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Criar Entitlements.plist
      run: |
        mkdir -p Platforms/iOS
        cat > Platforms/iOS/Entitlements.plist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
</dict>
</plist>
EOF
        
    - name: Instalar workloads
      run: |
        dotnet workload update
        dotnet workload install maui
        dotnet workload install ios
        
    - name: Restaurar pacotes
      run: dotnet restore --disable-parallel
      
    - name: Compilar iOS
      run: dotnet build -f net8.0-ios -c Release --no-restore --disable-parallel -p:EnableCodeSigning=false -p:CodesignKey= -p:CodesignProvision= -p:PackageSigningEnabled=false
      
    - name: Publicar iOS
      run: dotnet publish -f net8.0-ios -c Release --no-build --disable-parallel -p:EnableCodeSigning=false -p:CodesignKey= -p:CodesignProvision= -p:PackageSigningEnabled=false
      
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: DeliveryPorecatu-iOS
        path: bin/Release/net8.0-ios/ios/publish/*.ipa.