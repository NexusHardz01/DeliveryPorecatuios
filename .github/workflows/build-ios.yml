name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Pegar o código
      uses: actions/checkout@v4
      
    - name: Configurar .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Instalar workloads do MAUI para .NET 8
      run: |
        dotnet workload update
        dotnet workload install maui
        dotnet workload install ios
        
    - name: Restaurar pacotes
      run: dotnet restore
      
    - name: Compilar para iOS
      run: dotnet build -f net8.0-ios -c Release
      
    - name: Publicar para iOS
      run: dotnet publish -f net8.0-ios -c Release
      
    - name: Fazer upload do IPA
      uses: actions/upload-artifact@v4
      with:
        name: DeliveryPorecatu-iOS
        path: bin/Release/net8.0-ios/ios/publish/*.ipa