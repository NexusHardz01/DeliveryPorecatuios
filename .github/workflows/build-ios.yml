name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Remover SDKs 10 e 9
        run: |
          sudo rm -rf /Users/runner/.dotnet/sdk/10.* || true
          sudo rm -rf /Users/runner/.dotnet/sdk/9.* || true
          echo "DOTNET_ROOT=/Users/runner/.dotnet" >> $GITHUB_ENV
          echo "$HOME/.dotnet" >> $GITHUB_PATH
          
      - uses: actions/checkout@v4
      
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          
      - name: Criar Entitlements.plist
        run: |
          mkdir -p Platforms/iOS
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          </dict>
          </plist>' > Platforms/iOS/Entitlements.plist
          
      - name: Instalar workloads
        run: |
          dotnet workload update
          dotnet workload install maui
          dotnet workload install ios
          
      - name: Restaurar pacotes com RuntimeIdentifier
        run: dotnet restore "Delivery Porecatu.csproj" -f net8.0-ios -r ios-arm64 --disable-parallel
          
      - name: Build do projeto
        run: dotnet build "Delivery Porecatu.csproj" -f net8.0-ios -c Release --no-restore --disable-parallel -p:EnableCodeSigning=false -p:CodesignKey= -p:CodesignProvision= -p:PackageSigningEnabled=false -p:RuntimeIdentifier=ios-arm64
          
      - name: Publicar para iOS
        run: dotnet publish "Delivery Porecatu.csproj" -f net8.0-ios -c Release --no-build --disable-parallel -p:EnableCodeSigning=false -p:CodesignKey= -p:CodesignProvision= -p:PackageSigningEnabled=false -p:RuntimeIdentifier=ios-arm64 -p:ArchiveOnBuild=true
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DeliveryPorecatu-iOS
          path: bin/Release/net8.0-ios/ios-arm64/publish/*.ipa